name: Build IZER APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build Android APK
        run: flet build apk

      - name: Upload IZER APK
        uses: actions/upload-artifact@v4
        with:
          name: IZER-Final-APK
          path: build/apk/*.apk
